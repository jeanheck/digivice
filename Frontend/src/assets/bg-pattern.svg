<svg xmlns="http://www.w3.org/2000/svg" width="384" height="384" viewBox="0 0 256 256">
  <!-- Fundo escuro base para todo o bloco 256x256 -->
  <rect x="0" y="0" width="256" height="256" fill="#000030"/>

  <!-- Disquete 1: Quadrante Superior Esquerdo (0, 0) -->
  <g>
    <!-- Corpo externo -->
    <rect x="16" y="16" width="96" height="96" rx="4" fill="#000e3f" stroke="#001a5e" stroke-width="4"/>
    <!-- Parte de metal (shutter) -->
    <rect x="36" y="16" width="56" height="28" fill="none" stroke="#002277" stroke-width="3"/>
    <!-- Orificio de trava do disco -->
    <rect x="76" y="20" width="12" height="20" fill="none" stroke="#002277" stroke-width="2"/>
    <!-- Etiqueta (label) rotulo inferior -->
    <rect x="28" y="56" width="72" height="48" rx="2" fill="none" stroke="#00154a" stroke-width="2"/>
    <!-- Linhas adesivas da etiqueta -->
    <line x1="36" y1="64" x2="84" y2="64" stroke="#001a5e" stroke-width="2"/>
    <line x1="36" y1="76" x2="92" y2="76" stroke="#001a5e" stroke-width="2"/>
    <line x1="36" y1="88" x2="84" y2="88" stroke="#001a5e" stroke-width="2"/>
  </g>

  <!-- Disquete 2: Quadrante Inferior Direito (128, 128) -->
  <g>
    <!-- Corpo externo -->
    <rect x="144" y="144" width="96" height="96" rx="4" fill="#000e3f" stroke="#001a5e" stroke-width="4"/>
    <!-- Parte de metal (shutter) -->
    <rect x="164" y="144" width="56" height="28" fill="none" stroke="#002277" stroke-width="3"/>
    <!-- Orificio de trava do disco -->
    <rect x="204" y="148" width="12" height="20" fill="none" stroke="#002277" stroke-width="2"/>
    <!-- Etiqueta (label) rotulo inferior -->
    <rect x="156" y="184" width="72" height="48" rx="2" fill="none" stroke="#00154a" stroke-width="2"/>
    <!-- Linhas adesivas da etiqueta -->
    <line x1="164" y1="192" x2="212" y2="192" stroke="#001a5e" stroke-width="2"/>
    <line x1="164" y1="204" x2="220" y2="204" stroke="#001a5e" stroke-width="2"/>
    <line x1="164" y1="216" x2="212" y2="216" stroke="#001a5e" stroke-width="2"/>
  </g>
</svg>
